<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f3f4f6" stroke="#d1d5db" stroke-width="2" rx="8"/>
  
  <!-- Mountain silhouette -->
  <path d="M50 200 L120 120 L180 160 L240 100 L300 140 L350 180 L350 250 L50 250 Z" fill="#e5e7eb"/>
  
  <!-- Sun -->
  <circle cx="320" cy="80" r="25" fill="#d1d5db"/>
  
  <!-- Image icon in center -->
  <g transform="translate(200, 150)">
    <!-- Camera body -->
    <rect x="-30" y="-20" width="60" height="40" rx="4" fill="#9ca3af" stroke="#6b7280" stroke-width="1.5"/>
    
    <!-- Camera lens -->
    <circle cx="0" cy="0" r="12" fill="#6b7280" stroke="#4b5563" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="8" fill="#374151"/>
    
    <!-- Flash -->
    <rect x="15" y="-15" width="8" height="6" rx="1" fill="#9ca3af"/>
    
    <!-- Viewfinder -->
    <rect x="-8" y="-25" width="16" height="8" rx="2" fill="#9ca3af"/>
  </g>
  
  <!-- "No Image" text -->
  <text x="200" y="220" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="500" fill="#6b7280">
    Slika nije dostupna
  </text>
  
  <!-- Decorative dashed border -->
  <rect x="20" y="20" width="360" height="260" fill="none" stroke="#d1d5db" stroke-width="1" stroke-dasharray="8,4" rx="4"/>
</svg>